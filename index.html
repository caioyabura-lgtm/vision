<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Logo mobile</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #04060b;
      font-family: Arial, sans-serif;
    }
    canvas {
      display: block;
    }
    #startSensors {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      z-index: 20;
      padding: 12px 18px;
      border: 0;
      border-radius: 999px;
      background: rgba(255,255,255,0.9);
      color: #111;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <button id="startSensors">Ativar movimento</button>
  <script type="module" src="main.js"></script>
</body>
</html>
